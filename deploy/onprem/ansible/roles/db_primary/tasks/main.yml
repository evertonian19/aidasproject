#roles/db_primary/tasks/main.yml
---
- name: "[Primary] 구형 마스터 DB 컨테이너 깔끔하게 정리"
  ansible.builtin.shell: "docker rm -f aidas-db-master"
  failed_when: false

- name: "[Primary] 🔒 로컬 .env에서 비번 동적 추출 및 Ansible 변수 등록"
  ansible.builtin.set_fact:
    extracted_db_pass: "{{ lookup('ansible.builtin.ini', 'POSTGRES_PASSWORD type=properties file=' ~ project_root ~ '/.env.rocky02') }}"

- name: "[Primary] 💡 본진 전용 환경변수 파일(.env.rocky02) 안전 배달"
  ansible.builtin.copy:
    src: "{{ project_root }}/.env.rocky02"
    dest: "/home/user1/.env"

- name: "[Primary] ★ PostgreSQL 마스터 DB 컨테이너 가동 ★"
  ansible.builtin.shell: |
    docker run -d --name aidas-db-master \
      -p 5432:5432 \
      --env-file /home/user1/.env \
      --restart always \
      postgres:15 -c wal_level=replica -c max_wal_senders=10 -c max_replication_slots=10

- name: "[Primary] ⏳ DB가 안정적으로 완전히 가동될 때까지 대기"
  ansible.builtin.shell: "sleep 10"  # 🌟 [교정] 오작동 없는 리눅스 표준 sleep으로 변경 완공!

- name: "[Primary] ⏳ 스트리밍 복제용 전용 계정(replicator) 생성"
  ansible.builtin.shell: |
    docker exec -i aidas-db-master psql -U {{ db_user }} -d {{ db_name }} -c "CREATE ROLE {{ replica_user }} WITH REPLICATION PASSWORD '{{ extracted_db_pass }}' LOGIN;"
  failed_when: false

- name: "[Primary] 🔒 외부 복제 접근 허용(pg_hba.conf) 권한 설정 주입"
  ansible.builtin.shell: |
    docker exec -i aidas-db-master sh -c "echo 'host replication {{ replica_user }} {{ ubuntu_ip }}/32 md5' >> /var/lib/postgresql/data/pg_hba.conf"
    docker exec -i aidas-db-master psql -U {{ db_user }} -d {{ db_name }} -c "SELECT pg_reload_conf();"