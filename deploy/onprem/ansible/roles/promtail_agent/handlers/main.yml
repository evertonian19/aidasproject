# aidas/deploy/onprem/ansible/roles/promtail_agent/handlers/main.yml
# 역할:
# - Promtail 설정 변경 시 agent 재기동
# - 호출 시점: promtail config 또는 compose 파일 변경 후 notify 발생 시 실행
# - 수행 흐름: docker compose up -d 재실행

---
- name: restart promtail agent
  command: docker compose -f {{ promtail_base_dir }}/docker-compose-promtail.yml up -d
  args:
    chdir: "{{ promtail_base_dir }}"