<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AIDAS 서비스 화면</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .sidebar { height: 85vh; background-color: #f8f9fa; border-right: 1px solid #dee2e6; }
.product-img { 
    width: 100%; 
    aspect-ratio: 3 / 4; 
    background-color: #f8f9fa; 
    overflow: hidden; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
}

.product-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;     /* 여백 없이 카드를 꽉 채웁니다 */
    object-position: top;  /* 🌟 핵심: 상단(머리/어깨/목선)을 기준으로 고정하여 목이 잘리는 대참사 방지 */
}

/* 상세 페이지 큰 이미지도 동일한 비율 유지 (선택 사항) */
.detail-large-img { 
    width: 100%;
    aspect-ratio: 3 / 4; 
    background-color: #f8f9fa; 
    overflow: hidden; 
}

.detail-large-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top;
}
        .logo-btn { cursor: pointer; transition: opacity 0.2s; }
        .logo-btn:hover { opacity: 0.7; }
    </style>
</head>
<body>
    <div class="bg-dark text-white p-4 mb-4 shadow-sm">
        <div class="container-fluid d-flex justify-content-between align-items-center px-4">
            <h2 class="fw-bold m-0 logo-btn" onclick="handleLogoClick()">🛡️ AIDAS </h2>
            <p class="mb-0 small text-warning">● AWS & VMware 인프라 연동망 가동 중</p>
        </div>
    </div>

    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 sidebar p-3">
                <h5 class="fw-bold mb-4">카테고리</h5>
                <ul class="nav flex-column gap-2">
                    <li class="nav-item">
                        <a class="nav-link active text-primary fw-bold logo-btn" onclick="showListPage()">🔥 전체 상품 목록</a>
                    </li>
                    
                </ul>
            </div>

            <div class="col-md-10 p-4">
                <div id="list-section-view">
                    <h3 class="fw-bold mb-4 text-secondary">전체 상품 추천</h3>
                    <div class="row">
                        {% for product in products %}
                        <div class="col-md-4 mb-4">
                            <div class="card h-100 shadow-sm">
                                <div class="product-img p-0 overflow-hidden">
                                    <img src="" data-product="{{ product.product_name }}" 
                                        class="product-thumb">
                                </div>
                                <div class="card-body text-center">
                                    <h5 class="card-title fw-bold text-dark">{{ product.product_name }}</h5>
                                    <p class="card-text text-danger fw-bold fs-5 mb-3">{{ product.price }} 원</p>
                                    <button class="btn btn-primary w-100 fw-bold py-2" 
                                            onclick="showDetailPage('{{ product.product_name }}', '{{ product.price }}', '{{ product.stock_quantity }}')">
                                        사진 금액 제품명 확인
                                    </button>
                                </div>
                            </div>
                        </div>
                        {% endfor %}
                    </div>
                </div>

                <div id="detail-section-view" class="d-none">
                    <div class="mb-3">
                        <button class="btn btn-sm btn-outline-secondary" onclick="showListPage()">← 목록으로 돌아가기 (뒤로가기)</button>
                    </div>
                    <div class="row bg-white p-4 rounded border shadow-sm">
                        <div class="col-md-6">
                            <div class="detail-large-img rounded shadow-inner" id="detail-img-box">📸 상세 사진</div>
                        </div>
                        <div class="col-md-6 d-flex flex-column justify-content-between">
                            <div>
                                <span class="badge bg-success mb-2">AIDAS Verified 자산</span>
                                <h2 class="fw-bold text-dark mb-3" id="detail-title-box">제품명</h2>
                                <hr>
                                <h3 class="text-danger fw-bold mb-3" id="detail-price-box">0 원</h3>
                                <p class="text-muted" id="detail-stock-box">남은 수량: 0개</p>
                            </div>
                            <button class="btn btn-dark btn-lg w-100 py-3 fw-bold" onclick="alert('장바구니 담기 성공!')">🛒 장바구니 담기</button>
                        </div>
                    </div>
                </div>

                <hr class="my-5">
                <h4 class="fw-bold mb-3">추천 연관 상품</h4>
                <div class="row text-center">
                    <div class="col-md-4"><div class="p-4 bg-light border rounded shadow-sm text-muted small fw-bold">추천 상품 A (금액/제품명)</div></div>
                    <div class="col-md-4"><div class="p-4 bg-light border rounded shadow-sm text-muted small fw-bold">추천 상품 B (금액/제품명)</div></div>
                    <div class="col-md-4"><div class="p-4 bg-light border rounded shadow-sm text-muted small fw-bold">추천 상품 C (금액/제품명)</div></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let isDetailMode = false;

        function showDetailPage(name, price, stock) {
            isDetailMode = true;
            window.location.hash = "detail";

            document.getElementById('detail-title-box').innerText = name;
            document.getElementById('detail-price-box').innerText = Number(price).toLocaleString() + " 원";
            document.getElementById('detail-stock-box').innerText = "현재 남은 재고: " + stock + "개";
            document.getElementById('detail-img-box').innerHTML = '<img src="' + getImageUrl(name) + '">';

            document.getElementById('list-section-view').classList.add('d-none');
            document.getElementById('detail-section-view').classList.remove('d-none');
            window.scrollTo(0, 0);
        }

        function showListPage() {
            isDetailMode = false;
            if(window.location.hash) {
                history.replaceState('', document.title, window.location.pathname);
            }
            document.getElementById('detail-section-view').classList.add('d-none');
            document.getElementById('list-section-view').classList.remove('d-none');
        }

        function handleLogoClick() {
            if (isDetailMode) {
                showListPage();
            } else {
                location.href = "/";
            }
        }

        window.onhashchange = function() {
            if (!window.location.hash && isDetailMode) {
                showListPage();
            }
        };

        function getImageUrl(productName) {
            const baseUrl = "https://everton.cloud/static/images/";
            if (productName.includes("후드")) return baseUrl + "hoodie.jpg";
            if (productName.includes("니트")) return baseUrl + "knit.jpg";
            if (productName.includes("팬츠")) return baseUrl + "pants.jpg";
            if (productName.includes("셔츠")) return baseUrl + "shirts.webp";
            if (productName.includes("슬랙스")) return baseUrl + "slacks.webp";
            return baseUrl + "hoodie.jpg";
        }

        document.addEventListener('DOMContentLoaded', function() {
            document.querySelectorAll('.product-thumb').forEach(img => {
                img.src = getImageUrl(img.dataset.product);
            });
        });
    </script>
</body>
</html>
