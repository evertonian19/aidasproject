    promtail_version: "2.9.9"
    promtail_install_dir: /usr/local/bin
    promtail_config_dir: /etc/promtail
    promtail_positions_dir: /var/lib/promtail
    aidas_log_dir: /var/log/aidas

  tasks:
    # -------------------------------------------------------------------------
    # Docker 설치
    # -------------------------------------------------------------------------
    - name: Docker 의존성 패키지 설치
      dnf:
        name:
          - yum-utils
          - device-mapper-persistent-data
          - lvm2
        state: present

    - name: Docker CE 저장소 추가
      get_url:
        url: https://download.docker.com/linux/centos/docker-ce.repo
        dest: /etc/yum.repos.d/docker-ce.repo
        mode: "0644"

    - name: Docker CE 패키지 설치
      dnf:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        allowerasing: true

    - name: Docker 서비스 활성화 및 시작
      systemd:
        name: docker
        state: started
        enabled: true

    - name: 접속 계정을 docker 그룹에 추가
      user:
        name: "{{ ansible_user | default(ansible_user_id) }}"
        groups: docker
        append: true

