---
- name: "AIDAS 하이브리드 인프라 웹 서비스 및 DB 복제본 통합 자동 배포 (Roles 버전)"
  hosts: all
  become: false
  connection: local

  vars:
    main_db_ip: "172.16.8.202"
    ubuntu_ip: "172.16.8.203"

  vars_prompt:
    - name: "my_password"
      prompt: "원격 서버 접속 및 DB용 비밀번호를 입력하세요"
      private: true

  # 🧱 태스크를 직접 적지 않고 레고 블록처럼 역할을 조립합니다!
  roles:
    - role: web_primary
    - role: web_replica