name: EC2 연결 테스트
###############################
####### 테스트용 입니다#########
###############################
# 수동으로만 실행 (Actions 탭 → Run workflow 버튼)
on:
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/aidas-web

jobs:
  # ────────────────────────────────────────────────────────────────
  # JOB 1. ssh-check — EC2 SSH 접속 및 Docker 상태 확인
  # ────────────────────────────────────────────────────────────────
  ssh-check:
    runs-on: ubuntu-latest

    steps:
      - name: EC2 SSH 접속 및 환경 확인
        id: ssh
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            HOSTNAME=$(hostname)
            DOCKER_VER=$(docker --version)
            DOCKER_STATUS=$(sudo systemctl is-active docker)
            DISK=$(df -h / | tail -1 | awk '{print $4}')
            MEM=$(free -h | grep Mem | awk '{print $7}')

            echo "HOSTNAME=$HOSTNAME"
            echo "DOCKER_VER=$DOCKER_VER"
            echo "DOCKER_STATUS=$DOCKER_STATUS"
            echo "DISK_FREE=$DISK"
            echo "MEM_FREE=$MEM"

      - name: Job Summary 작성
        if: always()
        run: |
          echo "## EC2 환경 체크 결과" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 항목 | 값 |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| 대상 IP | \`${{ secrets.EC2_HOST }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| SSH 접속 | 성공 |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker |  설치됨 |" >> $GITHUB_STEP_SUMMARY
          echo "| 실행 시각 | $(date '+%Y-%m-%d %H:%M:%S') UTC |" >> $GITHUB_STEP_SUMMARY

  # ────────────────────────────────────────────────────────────────
  # JOB 2. docker-pull-test — Docker Hub에서 이미지 pull 테스트
  # ────────────────────────────────────────────────────────────────
  docker-pull-test:
    runs-on: ubuntu-latest
    needs: ssh-check

    steps:
      - name: EC2에서 hello-world pull 및 실행 테스트
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull hello-world
            docker run --rm hello-world
            docker rmi hello-world

      - name: Job Summary 작성
        if: always()
        run: |
          echo "## Docker Hub Pull 테스트" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 단계 | 결과 |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| hello-world pull |  |" >> $GITHUB_STEP_SUMMARY
          echo "| hello-world run  |  |" >> $GITHUB_STEP_SUMMARY
          echo "| 이미지 정리      |  |" >> $GITHUB_STEP_SUMMARY

  # ────────────────────────────────────────────────────────────────
  # JOB 3. port-check — 8000 포트 외부 응답 확인
  # ────────────────────────────────────────────────────────────────
  port-check:
    runs-on: ubuntu-latest
    needs: ssh-check

    steps:
      - name: EC2 8000 포트 확인
        id: port
        run: |
          nc -zv ${{ secrets.EC2_HOST }} 8000 && echo "STATUS=열림" || echo "STATUS=닫힘(컨테이너 미실행-정상)"

      - name: Job Summary 작성
        if: always()
        run: |
          echo "## 포트 확인" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 포트 | 상태 |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| 22 (SSH) | ✅ 접속 가능 (JOB1에서 확인) |" >> $GITHUB_STEP_SUMMARY
          echo "| 8000 (FastAPI) | 로그 확인 필요 (컨테이너 미실행 시 닫힘 정상) |" >> $GITHUB_STEP_SUMMARY

  # ────────────────────────────────────────────────────────────────
  # JOB 4. deploy-dry-run — aidas-web 이미지 배포 테스트
  # ────────────────────────────────────────────────────────────────
  deploy-dry-run:
    runs-on: ubuntu-latest
    needs: docker-pull-test

    steps:
      - name: Docker Hub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: aidas-web 배포 및 응답 테스트
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker stop aidas-web-test || true
            docker rm   aidas-web-test || true

            docker pull ${{ env.IMAGE_NAME }}:latest

            docker run -d \
              --name aidas-web-test \
              -p 8000:8000 \
              -e DB_URL="postgresql://aidas_user:aidas_password@localhost:5432/aidas_db" \
              ${{ env.IMAGE_NAME }}:latest

            sleep 5

            echo "=== 컨테이너 상태 ==="
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" | grep aidas-web-test

            echo "=== 컨테이너 로그 ==="
            docker logs aidas-web-test 2>&1 | tail -20

            echo "=== FastAPI 응답 ==="
            curl -s -o /dev/null -w "HTTP Status: %{http_code}" http://localhost:8000/ || true

            docker stop aidas-web-test
            docker rm   aidas-web-test
            docker image prune -f

      - name: Job Summary 작성
        if: always()
        run: |
          echo "## 배포 테스트 결과" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 단계 | 결과 |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| 이미지 pull (\`${{ env.IMAGE_NAME }}:latest\`) | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| 컨테이너 실행 (-p 8000:8000) | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| FastAPI 응답 확인 | 로그 탭에서 HTTP Status 확인 |" >> $GITHUB_STEP_SUMMARY
          echo "| 컨테이너 정리 | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> DB 미연결로 일부 라우터 500 응답은 정상입니다." >> $GITHUB_STEP_SUMMARY

  # ────────────────────────────────────────────────────────────────
  # JOB 5. summary — 전체 테스트 결과 요약
  # ────────────────────────────────────────────────────────────────
  summary:
    runs-on: ubuntu-latest
    needs: [ssh-check, docker-pull-test, port-check, deploy-dry-run]
    if: always()

    steps:
      - name: 전체 결과 요약
        run: |
          echo "# EC2 테스트 최종 요약" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | 상태 |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| ssh-check (SSH 접속 + Docker 확인) | ${{ needs.ssh-check.result == 'success' && '✅ 성공' || '❌ 실패' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| docker-pull-test (이미지 pull 테스트) | ${{ needs.docker-pull-test.result == 'success' && '✅ 성공' || '❌ 실패' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| port-check (포트 확인) | ${{ needs.port-check.result == 'success' && '✅ 성공' || '❌ 실패' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| deploy-dry-run (배포 테스트) | ${{ needs.deploy-dry-run.result == 'success' && '✅ 성공' || '❌ 실패' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**테스트 완료 시각:** $(date '+%Y-%m-%d %H:%M:%S') UTC" >> $GITHUB_STEP_SUMMARY
